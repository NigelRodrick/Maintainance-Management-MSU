apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: msu-maintenance-ingress
  namespace: msu-maintenance
  annotations:
    kubernetes.io/ingress.class: nginx
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/use-regex: "true"
    nginx.ingress.kubernetes.io/rate-limit: "100"
    nginx.ingress.kubernetes.io/rate-limit-window: "1m"
    nginx.ingress.kubernetes.io/configuration-snippet: |
      more_set_headers "X-Frame-Options: DENY";
      more_set_headers "X-Content-Type-Options: nosniff";
      more_set_headers "X-XSS-Protection: 1; mode=block";
      more_set_headers "Referrer-Policy: strict-origin-when-cross-origin";
spec:
  tls:
  - hosts:
    - maintenance.msu.ac.zw
    secretName: msu-maintenance-tls
  rules:
  - host: maintenance.msu.ac.zw
    http:
      paths:
      - path: /api
        pathType: Prefix
        backend:
          service:
            name: msu-maintenance-web-service
            port:
              number: 80
      - path: /health
        pathType: Prefix
        backend:
          service:
            name: msu-maintenance-web-service
            port:
              number: 80
      - path: /
        pathType: Prefix
        backend:
          service:
            name: msu-maintenance-web-service
            port:
              number: 80
---
apiVersion: v1
kind: Service
metadata:
  name: msu-maintenance-ingress-service
  namespace: msu-maintenance
  labels:
    app: msu-maintenance
    component: ingress
spec:
  selector:
    app: msu-maintenance
    component: web
  ports:
  - name: http
    port: 80
    targetPort: 5000
    protocol: TCP
  type: LoadBalancer

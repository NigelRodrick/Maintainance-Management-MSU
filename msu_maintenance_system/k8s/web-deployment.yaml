apiVersion: apps/v1
kind: Deployment
metadata:
  name: msu-maintenance-web
  namespace: msu-maintenance
  labels:
    app: msu-maintenance
    component: web
spec:
  replicas: 3
  selector:
    matchLabels:
      app: msu-maintenance
      component: web
  template:
    metadata:
      labels:
        app: msu-maintenance
        component: web
    spec:
      containers:
      - name: web
        image: msu-maintenance:latest
        ports:
        - containerPort: 5000
        envFrom:
        - configMapRef:
            name: msu-maintenance-config
        - secretRef:
            name: msu-maintenance-secrets
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /health
            port: 5000
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /health
            port: 5000
          initialDelaySeconds: 5
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
        volumeMounts:
        - name: logs
          mountPath: /app/logs
      volumes:
      - name: logs
        emptyDir: {}
      imagePullSecrets:
      - name: registry-secret
---
apiVersion: v1
kind: Service
metadata:
  name: msu-maintenance-web-service
  namespace: msu-maintenance
  labels:
    app: msu-maintenance
    component: web
spec:
  selector:
    app: msu-maintenance
    component: web
  ports:
  - name: http
    port: 80
    targetPort: 5000
    protocol: TCP
  type: ClusterIP

apiVersion: v1
kind: ConfigMap
metadata:
  name: msu-maintenance-config
  namespace: msu-maintenance
data:
  ENV: "production"
  FLASK_ENV: "production"
  FORCE_HTTPS: "true"
  SESSION_TIMEOUT_HOURS: "24"
  REDIS_URL: "redis://redis-service:6379/0"
  CELERY_BROKER_URL: "redis://redis-service:6379/0"
  CELERY_RESULT_BACKEND: "redis://redis-service:6379/0"
---
apiVersion: v1
kind: Secret
metadata:
  name: msu-maintenance-secrets
  namespace: msu-maintenance
type: Opaque
data:
  SECRET_KEY: <base64-encoded-secret-key>
  DB_SERVER: <base64-encoded-db-server>
  DB_NAME: <base64-encoded-db-name>
  DB_USER: <base64-encoded-db-user>
  DB_PASSWORD: <base64-encoded-db-password>
  # Replace <base64-encoded-*> with actual base64 encoded values

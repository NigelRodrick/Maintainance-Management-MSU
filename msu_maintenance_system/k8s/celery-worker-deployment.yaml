apiVersion: apps/v1
kind: Deployment
metadata:
  name: msu-maintenance-celery-worker
  namespace: msu-maintenance
  labels:
    app: msu-maintenance
    component: celery-worker
spec:
  replicas: 2
  selector:
    matchLabels:
      app: msu-maintenance
      component: celery-worker
  template:
    metadata:
      labels:
        app: msu-maintenance
        component: celery-worker
    spec:
      containers:
      - name: celery-worker
        image: msu-maintenance:latest
        command: ["celery", "-A", "app.tasks", "worker", "--loglevel=info", "--concurrency=4"]
        envFrom:
        - configMapRef:
            name: msu-maintenance-config
        - secretRef:
            name: msu-maintenance-secrets
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        volumeMounts:
        - name: logs
          mountPath: /app/logs
      volumes:
      - name: logs
        emptyDir: {}
      imagePullSecrets:
      - name: registry-secret
---
apiVersion: v1
kind: Service
metadata:
  name: msu-maintenance-celery-worker-service
  namespace: msu-maintenance
  labels:
    app: msu-maintenance
    component: celery-worker
spec:
  selector:
    app: msu-maintenance
    component: celery-worker
  ports:
  - name: worker
    port: 5555
    targetPort: 5555
    protocol: TCP
  type: ClusterIP

name: Mobile Android APK (debug)

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'mobile/**'
      - '.github/workflows/mobile-android.yml'

permissions:
  contents: read

jobs:
  android-debug-apk:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: mobile/package-lock.json

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Capacitor deps & native project
        working-directory: mobile
        run: |
          npm install
          if [ ! -d android ]; then npx cap add android; fi
          npx cap sync

      - name: Build debug APK
        working-directory: mobile/android
        run: chmod +x gradlew && ./gradlew assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: msu-maintenance-android-debug
          path: mobile/android/app/build/outputs/apk/debug/*.apk
          if-no-files-found: error
